# TINY-style growing schedule. Composed with configs/train.yaml; optionally with
# configs/distill.yaml (when growing during distillation).
#
# This config decouples WHAT grows (ffn / attention / both) from WHEN
# (warmup_epochs, interval_epochs, max_grows). The training script chooses the
# growth signal: distillation loss when a teacher is present, hard-label CE
# otherwise (matches growing-attention's signal_source pattern).
enabled: true
warmup_epochs: 1                      # epochs of plain training before first grow attempt
interval_epochs: 1                    # epochs between grow attempts after warmup
max_grows: 5                          # cap on total grow steps across the run
num_probe_batches: 8                  # batches used to accumulate growth statistics

# `signal_source` is the loss used to drive the growth statistics. The default
# below is a placeholder — each training script overrides it at runtime to match
# its own loss (train_grow.py -> "supervised", train_distill_grow.py ->
# "distillation"). Matches the growing-attention pattern.
signal_source: distillation           # "distillation" | "supervised"

optimizer:
  reset_after_grow: true              # rebuild AdamW after a successful grow (resets momentum)

ffn:
  enabled: true
  layers: all                         # "all" or a list of encoder-layer indices, e.g. [0, 4, 8, 11]
  neurons_per_grow: 64                # added to intermediate (3072) dim per grow step
  alpha: 1.0e-3                       # Tikhonov regularization on the (H0+alpha*I) solve
  max_intermediate: 6144              # hard cap to prevent runaway growth

attention:
  enabled: true
  layers: all                         # subset (e.g. [3, 6, 9]) keeps grow-step memory bounded
  p_per_grow: 4                       # added to per-head k_dim per grow step
  max_k_per_head: 128                 # hard cap; head_size is 64 in RoBERTa-base
  top_k: 12                           # heads selected per grow step from ALL candidate heads
  # TwoShotsIterative knobs (see src/growth/two_shots.py in growing-attention):
  lambda_reg: 1.0e-3                  # ridge for Step 1 (fixed-arch update)
  alpha: 1.0e-3                       # ridge for Step 2 (growth update)
  adaptive_tau: 1.0e-4                # adaptive regularization scale
  cg_tol: 1.0e-5                      # CG relative-residual tolerance
  cg_max_iter: 50                     # CG iteration cap per system
  precision: float64                  # fp64 for the math; CG matvecs run in this dtype
